version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/budgeting
      JWT_SECRET: your-base64-secret
      JWT_EXPIRATION_MS: 3600000
    depends_on:
      - mongo

  budget-service:
    build:
      context: .
      dockerfile: budget-service/Dockerfile
    container_name: budget-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/budgeting
      JWT_SECRET: your-base64-secret
    depends_on:
      - mongo

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    container_name: transaction-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/budgeting
      JWT_SECRET: your-base64-secret
    depends_on:
      - mongo

volumes:
  mongo_data:
