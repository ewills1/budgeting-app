version: "3.9"

services:
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/budgeting-app
      JWT_SECRET: your-base64-secret
      JWT_EXPIRATION_MS: 3600000
      SERVER_PORT: 8080
    depends_on:
      - mongo

  budget-service:
    build:
      context: .
      dockerfile: budget-service/Dockerfile
    container_name: budget-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/budgeting-app
      JWT_SECRET: your-base64-secret
      SERVER_PORT: 8081
    depends_on:
      - mongo

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    container_name: transaction-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/budgeting-app
      JWT_SECRET: your-base64-secret
      SERVER_PORT: 8082
    depends_on:
      - mongo

  category-service:
    build:
      context: .
      dockerfile: category-service/Dockerfile
    container_name: category-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/budgeting-app
      JWT_SECRET: your-base64-secret
      SERVER_PORT: 8083
    depends_on:
      - mongo

volumes:
  mongo_data:

